<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign-Up Form</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="main">
        <div class="left">
            <div class="logo"> 
            <img src="./images/odin-lined.png" alt="logo" />
        <h1 class="logo-text"> Odin </h1>    
        </div>
        </div>
        <div class="right">
            <div class="first"> 
            <h3> Hi, this is not a real online Service, <br/> 
            but we can always make such things work <br/>
            to get the better of us in <em>Real</em> Life 
            <br/><br/>
            Sign up <em>Now</em> to be a Part of It <br/>
            You <em>Know</em> You want to </h3>
            </div>

            <div class="second"> 
            <h2> Let's do this </h2> 
            
            <div class="form-div">
            <form action="" method="get">
                <div class="form-grid">
                
                <div class="input-form">
                <label for="firstName">First Name</label>
                <input type="text" placeholder="Username" required name="firstName" />
                </div>
                
                <div class="input-form">
                <label for="lastName">Last Name</label>
                <input type="text" placeholder="Username" required name="lastName" />
                </div>

                <div class="input-form">
                <label for="Email">Email</label>
                <input type="email" placeholder="Email" required name="email" />
                </div>

                <div class="input-form">
                <label for="tel">Phone Number</label>
                <input type="text" placeholder="Telephone" required name="tel" />
                </div>
                
                <div class="input-form">
                <label for="password">Password</label>
                <input type="password" placeholder="Password" required name="password" />
                </div>
                
                <div class="input-form">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" placeholder="Confirm Password" required name="confirmPassword" />
                </div>
                </div>
                <br/><br/>
                <button type="Submit">Create Account</button> </form> 
            </div>
            <br/><br/>
            <div class="third"> Already have an Account? Log In </div>
    </div>
</body>
</html>
